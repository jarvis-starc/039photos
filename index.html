<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>039 Photos - Ultimate AI Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Existing Styles Remain Unchanged */
        :root { --neon: #00f2ff; --dark: #0b1220; --card: #111827; --danger: #ff3e3e; --accent: rgba(0, 242, 255, 0.1); }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background: var(--dark); color: var(--neon); min-height:100vh; transition:.3s; overflow-x: hidden; }
        .light-theme { background:#f5f5f5; color:#111; --card: #fff; --dark: #f5f5f5; --accent: rgba(0,0,0,0.05); }
        header { display:flex; align-items:center; padding:12px 20px; background:rgba(14, 22, 37, 0.9); border-bottom:1px solid var(--accent); position: sticky; top: 0; z-index: 900; backdrop-filter: blur(10px); }
        .hamburger { font-size:22px; cursor:pointer; margin-right:15px; }
        .logo { font-size:18px; font-weight:bold; flex-grow: 1; letter-spacing: 1px; }
        .sidebar { position:fixed; left:-300px; top:0; width:280px; height:100%; background:#0d1626; padding:20px; transition:.3s; z-index:1001; overflow-y: auto; }
        .sidebar.active { left:0; }
        #sidebarBackdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; }
        #sidebarBackdrop.active { display: block; }
        .sidebar button { width:100%; margin: 5px 0; padding: 12px; text-align: left; background: transparent; color: inherit; border: 1px solid #1e2a3d; cursor: pointer; border-radius: 8px; font-size: 14px; }
        .badge { background: var(--danger); color: white; padding: 2px 7px; border-radius: 10px; font-size: 10px; float: right; }
        .main { display:none; padding:15px; max-width: 1200px; margin: auto; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from {opacity:0} to {opacity:1} }
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(14, 25, 44, 0.8); padding: 15px; border-radius: 12px; border: 1px solid var(--accent); text-align: center; cursor: pointer; transition: 0.2s; }
        .stat-box.full { grid-column: span 2; }
        .stat-box:hover { border-color: var(--neon); background: var(--accent); }
        .stat-box h4 { font-size: 10px; text-transform: uppercase; opacity: 0.7; margin-bottom: 5px; }
        .stat-box span { font-size: 22px; font-weight: bold; color: #fff; }
        .month-header { font-size: 20px; color: #fff; margin: 30px 0 15px; padding-left: 10px; border-left: 4px solid var(--neon); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        @media (max-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        .card { position: relative; aspect-ratio: 1/1; background: #000; overflow: hidden; cursor: pointer; border-radius: 2px; }
        .card img, .card video { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .card:hover img { transform: scale(1.1); filter: brightness(0.7); }
        .card-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); opacity: 0; transition: 0.3s; }
        .card:hover .card-overlay { opacity: 1; }
        .card-title { font-size: 11px; color: #fff; font-weight: bold; }
        .like-tag { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 12px; font-size: 11px; color: #fff; z-index: 10; display: flex; align-items: center; gap: 4px; }
        .overlay { position:fixed; inset:0; background: rgba(7, 12, 21, 0.95); display:flex; justify-content:center; align-items:center; z-index:2000; padding: 20px; }
        .box { background:#0e192c; padding:25px; border-radius:20px; width:100%; max-width: 380px; text-align: center; border: 1px solid var(--accent); }
        .box input, .box select { width:100%; padding:12px; margin-bottom:12px; background:#16243a; border:1px solid #2a3a52; color:#fff; border-radius:8px; }
        .box button { width:100%; padding:12px; background:var(--neon); color:#000; border:none; border-radius:25px; font-weight:bold; cursor:pointer; margin-top: 5px; }
        .chat-float { position:fixed; bottom:20px; right:20px; background: var(--neon); color:#0b1220; padding:12px 22px; border-radius:30px; cursor:pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,242,255,0.3); z-index: 800; }
        .recycle-home-btn { width: 100%; padding: 15px; background: rgba(255, 62, 62, 0.05); border: 1px dashed var(--danger); color: var(--danger); border-radius: 12px; cursor: pointer; margin-bottom: 10px; font-size: 13px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop><source src="https://files.catbox.moe/6rg98h.mp3" type="audio/mpeg"></audio>
    <div id="sidebarBackdrop" onclick="toggleSidebar()"></div>

    <header>
        <div class="hamburger" onclick="toggleSidebar()">☰</div>
        <div class="logo" onclick="location.reload()">039 PHOTOS</div>
        <div class="nav-btns" style="display: flex;">
            <button onclick="toggleTheme()">🌓</button>
            <button onclick="toggleMusic()">🎵</button>
        </div>
    </header>

    <div class="sidebar" id="sidebar">
        <div style="margin-bottom: 25px; padding: 10px; border-bottom: 1px solid #1e2a3d;">
            <span style="color: #00ff88;">●</span> <b id="sideUser">Guest</b>
        </div>
        <button onclick="showSection('gallery')">🖼 Home Gallery</button>
        <button onclick="showSection('upload')">📤 Upload Media</button>
        <h3 style="font-size: 11px; margin: 25px 0 10px; opacity: 0.5; letter-spacing: 1px;">ADMIN TOOLS</h3>
        <button onclick="checkAdmin('requests')">📩 System Requests <span id="reqBadge" class="badge">0</span></button>
        <button onclick="logout()" style="color: var(--danger); margin-top: 40px;">Logout</button>
    </div>

    <div class="overlay" id="rolePopup">
        <div class="box">
            <h1>039 PHOTOS</h1>
            <p>AI Powered Visual System</p>
            <button onclick="selectRole('admin')">Harshah (Owner)</button>
            <button onclick="selectRole('friend')" style="background:#1e2a3d; color:#fff; margin-top:10px;">Friend Access</button>
        </div>
    </div>

    <div class="overlay hidden" id="loginPopup">
        <div class="box">
            <h3 id="loginTitle">Login</h3>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="handleLogin()">Authorize</button>
        </div>
    </div>

    <main class="main" id="mainContent">
        <div class="stats-bar">
            <div class="stat-box" onclick="filterGallery('all')"><h4>Total</h4><span id="statTotal">0</span></div>
            <div class="stat-box" onclick="filterGallery('photo')"><h4>Photos</h4><span id="statPhotos">0</span></div>
            <div class="stat-box full" onclick="filterGallery('video')"><h4>Videos</h4><span id="statVideos">0</span></div>
        </div>

        <section id="sec-gallery">
            <div id="galleryContainer"></div>
        </section>

        <section id="sec-upload" class="hidden">
            <div class="box" style="max-width:100%; background:transparent; border:none; padding:0;">
                <h2>Upload to Cloud</h2>
                <input type="text" id="mediaTitle" placeholder="Title">
                <select id="mediaType">
                    <option value="photo">Image</option>
                    <option value="video">Video</option>
                </select>
                <input type="file" id="fileInput" accept="image/*,video/*">
                <button id="uploadBtn" onclick="processUpload()">Start Upload</button>
            </div>
        </section>
    </main>

    <script>
        // BACKEND CONFIGURATION
        const SB_URL = "https://ikdvltlpilnvrekyhuxq.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlrZHZsdGxwaWxudnJla3lodXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MDA2MjYsImV4cCI6MjA4NzE3NjYyNn0.maS1tsMHyGXDUSC1oSZG-caK1zYMojOOV4so-a8UeMQ";
        const supabase = collections = supabase.createClient(SB_URL, SB_KEY);

        let media = [];
        let currentUser = null;
        let isAdmin = false;
        let currentFilter = 'all';

        // AUTH LOGIC
        function selectRole(role) {
            isAdmin = (role === 'admin');
            document.getElementById('rolePopup').classList.add('hidden');
            document.getElementById('loginPopup').classList.remove('hidden');
            document.getElementById('loginTitle').innerText = isAdmin ? "Owner Access" : "Guest Portal";
        }

        function handleLogin() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            if(isAdmin && (u !== "Harshah" || p !== "harsha@112")) return alert("Invalid Owner Credentials");
            if(!u) return alert("Enter Username");
            
            currentUser = u;
            document.getElementById('loginPopup').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('sideUser').innerText = u + (isAdmin ? " (Owner)" : "");
            fetchMedia();
        }

        // FETCH DATA FROM SUPABASE
        async function fetchMedia() {
            const { data, error } = await supabase
                .from('media')
                .select('*')
                .order('date', { ascending: false });

            if (error) console.error(error);
            else {
                media = data;
                renderGallery();
                updateStats();
            }
        }

        function renderGallery() {
            const container = document.getElementById('galleryContainer');
            container.innerHTML = "";
            let filtered = currentFilter === 'all' ? media : media.filter(m => m.type === currentFilter);

            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const grouped = filtered.reduce((acc, item) => {
                const d = new Date(item.date);
                const mKey = `${months[d.getMonth()]} ${d.getFullYear()}`;
                if (!acc[mKey]) acc[mKey] = [];
                acc[mKey].push(item);
                return acc;
            }, {});

            for (const month in grouped) {
                const section = document.createElement('div');
                section.innerHTML = `<h3 class="month-header">${month}</h3>`;
                const grid = document.createElement('div');
                grid.className = "grid";
                grouped[month].forEach(item => {
                    const card = document.createElement('div');
                    card.className = "card";
                    const mediaTag = item.type === 'video' ? `<video src="${item.src}"></video>` : `<img src="${item.src}">`;
                    card.innerHTML = `
                        <div class="like-tag" onclick="likeMedia(${item.id}, ${item.likes}, event)">❤️ ${item.likes}</div>
                        ${mediaTag}
                        <div class="card-overlay">
                            <span class="card-title">${item.title}</span>
                            <span style="font-size:9px;">By ${item.owner}</span>
                            ${isAdmin ? `<button onclick="deleteMedia(${item.id}, event)" style="background:red; color:white; border:none; padding:2px; margin-top:5px; border-radius:4px; cursor:pointer;">Delete</button>` : ''}
                        </div>`;
                    card.onclick = () => alert(`Viewing: ${item.title}`);
                    grid.appendChild(card);
                });
                section.appendChild(grid);
                container.appendChild(section);
            }
        }

        // SUPABASE MUTATIONS
        async function processUpload() {
            const fileInput = document.getElementById('fileInput');
            const title = document.getElementById('mediaTitle').value;
            const type = document.getElementById('mediaType').value;
            const btn = document.getElementById('uploadBtn');

            if(!fileInput.files[0] || !title) return alert("Missing Info");
            btn.innerText = "Processing...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async function(e) {
                const { error } = await supabase.from('media').insert([{
                    title, type, src: e.target.result, owner: currentUser, likes: 0, date: new Date().toISOString().split('T')[0]
                }]);

                if (error) alert("Upload Failed");
                else {
                    btn.innerText = "Start Processing";
                    btn.disabled = false;
                    showSection('gallery');
                    fetchMedia();
                }
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        async function likeMedia(id, currentLikes, e) {
            e.stopPropagation();
            const { error } = await supabase.from('media').update({ likes: currentLikes + 1 }).eq('id', id);
            if (!error) fetchMedia();
        }

        async function deleteMedia(id, e) {
            e.stopPropagation();
            if(!confirm("Delete forever?")) return;
            const { error } = await supabase.from('media').delete().eq('id', id);
            if (!error) fetchMedia();
        }

        // UI HELPERS
        function updateStats() {
            document.getElementById('statTotal').innerText = media.length;
            document.getElementById('statPhotos').innerText = media.filter(m => m.type === 'photo').length;
            document.getElementById('statVideos').innerText = media.filter(m => m.type === 'video').length;
        }

        function filterGallery(type) { currentFilter = type; renderGallery(); }
        function showSection(id) {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            if(window.innerWidth < 800) toggleSidebar();
        }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebarBackdrop').classList.toggle('active'); }
        function toggleTheme() { document.body.classList.toggle('light-theme'); }
        function toggleMusic() { const m = document.getElementById('bgMusic'); m.paused ? m.play() : m.pause(); }
        function logout() { location.reload(); }
    </script>
</body>
</html>
