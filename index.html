<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>039 Photos HARSHAH.. - Ultimate AI Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --dark: #0b1220; --card: #111827; --danger: #ff3e3e; --accent: rgba(0, 242, 255, 0.1); }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background: var(--dark); color: var(--neon); min-height:100vh; transition:.3s; overflow-x: hidden; }
        .light-theme { background:#f5f5f5; color:#111; --card: #fff; --dark: #f5f5f5; --accent: rgba(0,0,0,0.05); }

        header { display:flex; align-items:center; padding:12px 20px; background:rgba(14, 22, 37, 0.9); border-bottom:1px solid var(--accent); position: sticky; top: 0; z-index: 900; backdrop-filter: blur(10px); }
        .hamburger { font-size:22px; cursor:pointer; margin-right:15px; }
        .logo { font-size:18px; font-weight:bold; flex-grow: 1; letter-spacing: 1px; }

        .sidebar { position:fixed; left:-300px; top:0; width:280px; height:100%; background:#0d1626; padding:20px; transition:.3s; z-index:1001; overflow-y: auto; }
        .sidebar.active { left:0; }
        #sidebarBackdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; }
        #sidebarBackdrop.active { display: block; }
        .sidebar button { width:100%; margin: 5px 0; padding: 12px; text-align: left; background: transparent; color: inherit; border: 1px solid #1e2a3d; cursor: pointer; border-radius: 8px; font-size: 14px; }
        .badge { background: var(--danger); color: white; padding: 2px 7px; border-radius: 10px; font-size: 10px; float: right; }

        .main { display:none; padding:15px; max-width: 1200px; margin: auto; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from {opacity:0} to {opacity:1} }
        
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(14, 25, 44, 0.8); padding: 15px; border-radius: 12px; border: 1px solid var(--accent); text-align: center; cursor: pointer; transition: 0.2s; }
        .stat-box.full { grid-column: span 2; }
        .stat-box:hover { border-color: var(--neon); background: var(--accent); }
        .stat-box h4 { font-size: 10px; text-transform: uppercase; opacity: 0.7; margin-bottom: 5px; }
        .stat-box span { font-size: 22px; font-weight: bold; color: #fff; }

        .month-header { font-size: 20px; color: #fff; margin: 30px 0 15px; padding-left: 10px; border-left: 4px solid var(--neon); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        @media (max-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); } }

        .card { position: relative; aspect-ratio: 1/1; background: #000; overflow: hidden; cursor: pointer; border-radius: 5px; border: 1px solid var(--accent); }
        .card img, .card video { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .card-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); opacity: 0; transition: 0.3s; }
        .card:hover .card-overlay { opacity: 1; }
        .card-title { font-size: 11px; color: #fff; font-weight: bold; }
        .like-tag { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 12px; font-size: 11px; color: #fff; z-index: 10; display: flex; align-items: center; gap: 4px; }

        .overlay { position:fixed; inset:0; background: rgba(7, 12, 21, 0.95); display:flex; justify-content:center; align-items:center; z-index:2000; padding: 20px; }
        .box { background:#0e192c; padding:25px; border-radius:20px; width:100%; max-width: 380px; text-align: center; border: 1px solid var(--accent); }
        .box input, .box select { width:100%; padding:12px; margin-bottom:12px; background:#16243a; border:1px solid #2a3a52; color:#fff; border-radius:8px; }
        .box button { width:100%; padding:12px; background:var(--neon); color:#000; border:none; border-radius:25px; font-weight:bold; cursor:pointer; margin-top: 5px; }

        .chat-float { position:fixed; bottom:20px; right:20px; background: var(--neon); color:#0b1220; padding:12px 22px; border-radius:30px; cursor:pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,242,255,0.3); z-index: 800; }
        .recycle-home-btn { width: 100%; padding: 15px; background: rgba(255, 62, 62, 0.05); border: 1px dashed var(--danger); color: var(--danger); border-radius: 12px; cursor: pointer; margin-bottom: 10px; font-size: 13px; }
        
        #activityPopup table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 11px; }
        #activityPopup th, #activityPopup td { border: 1px solid #1e2a3d; padding: 6px; text-align: left; color: white; }
        #activityPopup th { background: rgba(0, 242, 255, 0.1); color: var(--neon); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<audio id="bgMusic" loop><source src="https://files.catbox.moe/6rg98h.mp3" type="audio/mpeg"></audio>

<div id="sidebarBackdrop" onclick="toggleSidebar()"></div>

<header>
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="logo">039 PHOTOS HARSHAH</div>
    <div class="nav-btns" style="display: flex;">
        <button onclick="toggleTheme()" style="background:none; border:none; font-size:20px; cursor:pointer;">🌓</button>
        <button onclick="toggleMusic()" style="background:none; border:none; font-size:20px; cursor:pointer;">🎵</button>
    </div>
</header>

<div class="sidebar" id="sidebar">
    <div style="margin-bottom: 25px; padding: 10px; border-bottom: 1px solid #1e2a3d;">
        <span style="color: #00ff88;">●</span> <b id="sideUser">Guest</b>
    </div>
    <button onclick="showSection('gallery')">🖼 Home Gallery</button>
    <button onclick="showSection('upload')">📤 Upload Media</button>
    <button onclick="showSection('recycle')">🗑 Recycle Bin</button>
    <h3 style="font-size: 11px; margin: 25px 0 10px; opacity: 0.5; letter-spacing: 1px;">ADMIN TOOLS</h3>
    <button onclick="checkAdmin('requests')">📩 System Requests <span id="reqBadge" class="badge">0</span></button>
    <button onclick="checkAdmin('activity')">📝 Activity Logs</button>
    <button onclick="logout()" style="color: var(--danger); border-color: rgba(255,62,62,0.2); margin-top: 40px;">Logout</button>
</div>

<div class="overlay" id="rolePopup">
    <div class="box">
        <h1>039 PHOTOS HARSHAH..</h1>
        <p style="opacity: 0.6; font-size: 13px; margin: 10px 0 20px;">Secure Visual Cloud System</p>
        <button onclick="selectRole('admin')">Harshah (Owner)</button>
        <button onclick="selectRole('friend')" style="background:#1e2a3d; color:#fff; margin-top:10px;">HARSHAH Friend</button>
    </div>
</div>

<div class="overlay hidden" id="loginPopup">
    <div class="box">
        <h3 id="loginTitle" style="margin-bottom:20px;">Login</h3>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button id="authBtn" onclick="handleLogin()">Ok, Authorize</button>
    </div>
</div>

<div class="overlay hidden" id="activityPopup" onclick="this.classList.add('hidden')">
    <div class="box" style="max-width: 600px; max-height: 80vh; overflow-y: auto;" onclick="event.stopPropagation()">
        <h2 style="color: var(--neon); margin-bottom: 15px;">Activity Logs</h2>
        <div id="activityContent"></div>
    </div>
</div>

<main class="main" id="mainContent">
    <div class="stats-bar">
        <div class="stat-box" onclick="filterGallery('all')"><h4>All</h4><span id="statTotal">0</span></div>
        <div class="stat-box" onclick="filterGallery('photo')"><h4>Photos</h4><span id="statPhotos">0</span></div>
        <div class="stat-box full" onclick="filterGallery('video')"><h4>Videos</h4><span id="statVideos">0</span></div>
    </div>

    <button class="recycle-home-btn" onclick="requestAccess('Recycle Bin Access')">
        ⚠️ Request Restore or Access Deleted Media
    </button>

    <section id="sec-gallery">
        <div id="galleryContainer"></div>
    </section>

    <section id="sec-upload" class="hidden">
        <div class="box" style="max-width:100%; background:transparent; border:none; padding:0;">
            <h2 style="margin-bottom:20px;">Push to Cloud</h2>
            <input type="text" id="mediaTitle" placeholder="Title">
            <select id="mediaType">
                <option value="photo">Image</option>
                <option value="video">Video</option>
            </select>
            <input type="file" id="fileInput">
            <button id="upBtn" onclick="processUpload()">Start Upload</button>
        </div>
    </section>

    <section id="sec-recycle" class="hidden">
        <h2 class="month-header" style="border-color: var(--danger);">Recycle Bin</h2>
        <div id="recycleContainer"></div>
    </section>

    <section id="sec-requests" class="hidden">
        <h2>Requests</h2>
        <div id="requestList" style="margin-top:20px;"></div>
    </section>
</main>

<div class="chat-float" onclick="alert('Connecting to Harshah...')">💬 Support</div>

<script>
    const SB_URL = "https://ikdvltlpilnvrekyhuxq.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlrZHZsdGxwaWxudnJla3lodXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2MDA2MjYsImV4cCI6MjA4NzE3NjYyNn0.maS1tsMHyGXDUSC1oSZG-caK1zYMojOOV4so-a8UeMQ";
    
    let supabase;
    try {
        supabase = window.supabase.createClient(SB_URL, SB_KEY);
    } catch(e) { console.error("Supabase Error", e); }

    let currentUser = null;
    let isAdmin = false;
    let currentFilter = 'all';
    let sessionRecordId = null;

    function selectRole(role) {
        isAdmin = (role === 'admin');
        document.getElementById('rolePopup').classList.add('hidden');
        document.getElementById('loginPopup').classList.remove('hidden');
        document.getElementById('loginTitle').innerText = isAdmin ? "Owner Login" : "Guest Portal";
    }

    async function handleLogin() {
        const u = document.getElementById('loginUser').value;
        const p = document.getElementById('loginPass').value;
        if (!u) return alert("Enter Name");
        if (isAdmin && (u !== "Harshah" || p !== "harsha@112")) return alert("Wrong Credentials");

        document.getElementById('authBtn').innerText = "Authenticating...";
        currentUser = u;
        
        // Login Success (Immediate UI switch to prevent sticking)
        document.getElementById('loginPopup').classList.add('hidden');
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('sideUser').innerText = u + (isAdmin ? " (Owner)" : "");

        try {
            await supabase.from('site_users').upsert({ username: u, password: p || 'guest' }, { onConflict: 'username' });
            const { data } = await supabase.from('login_history').insert([{ username: u }]).select();
            if (data) sessionRecordId = data[0].id;
            fetchData();
        } catch(e) { 
            console.log("DB connection slow, proceeding anyway.");
            fetchData(); 
        }
    }

    async function fetchData() {
        const { data: media } = await supabase.from('media').select('*').order('created_at', {ascending: false});
        const { data: bin } = await supabase.from('recycle_bin').select('*').order('deleted_at', {ascending: false});
        
        renderGrid(media || [], 'galleryContainer', false);
        renderGrid(bin || [], 'recycleContainer', true);
        updateStats(media || []);
        
        const { count } = await supabase.from('system_requests').select('*', {count:'exact', head:true}).eq('status', 'pending');
        document.getElementById('reqBadge').innerText = count || 0;
    }

    function renderGrid(items, containerId, isRecycle) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        let filtered = currentFilter === 'all' || isRecycle ? items : items.filter(m => m.type === currentFilter);

        const grouped = filtered.reduce((acc, item) => {
            const d = new Date(item.created_at || item.deleted_at);
            const key = d.toLocaleString('default', { month: 'long', year: 'numeric' });
            if (!acc[key]) acc[key] = [];
            acc[key].push(item);
            return acc;
        }, {});

        for (const month in grouped) {
            container.innerHTML += `<h3 class="month-header">${month}</h3>`;
            const grid = document.createElement('div');
            grid.className = "grid";
            grouped[month].forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        ${!isRecycle ? `<div class="like-tag" onclick="likeMedia(${item.id}, ${item.likes}, event)">❤️ ${item.likes}</div>` : ''}
                        ${item.type === 'video' ? `<video src="${item.src}"></video>` : `<img src="${item.src}">`}
                        <div class="card-overlay">
                            <span class="card-title">${item.title}</span>
                            <span style="font-size:9px;">By ${item.owner}</span>
                            ${isAdmin ? `
                                <button onclick="${isRecycle ? `restoreMedia(${JSON.stringify(item).replace(/"/g, '&quot;')}, event)` : `deleteMedia(${JSON.stringify(item).replace(/"/g, '&quot;')}, event)`}" 
                                style="background:${isRecycle ? 'var(--neon)' : 'red'}; color:#000; border:none; font-size:9px; padding:4px; margin-top:5px; border-radius:4px; font-weight:bold;">
                                ${isRecycle ? 'RESTORE' : 'DELETE'}</button>` : ''}
                        </div>
                    </div>`;
            });
            container.appendChild(grid);
        }
    }

    async function processUpload() {
        const file = document.getElementById('fileInput').files[0];
        const title = document.getElementById('mediaTitle').value;
        if (!file || !title) return alert("Fill all fields");
        document.getElementById('upBtn').innerText = "Processing...";
        const reader = new FileReader();
        reader.onload = async (e) => {
            await supabase.from('media').insert([{ title, type: document.getElementById('mediaType').value, src: e.target.result, owner: currentUser }]);
            document.getElementById('upBtn').innerText = "Start Upload";
            showSection('gallery');
            fetchData();
        };
        reader.readAsDataURL(file);
    }

    async function deleteMedia(item, e) {
        e.stopPropagation();
        if(!confirm("Move to Recycle Bin?")) return;
        await supabase.from('recycle_bin').insert([{ title: item.title, type: item.type, src: item.src, owner: item.owner }]);
        await supabase.from('media').delete().eq('id', item.id);
        fetchData();
    }

    async function restoreMedia(item, e) {
        e.stopPropagation();
        await supabase.from('media').insert([{ title: item.title, type: item.type, src: item.src, owner: item.owner }]);
        await supabase.from('recycle_bin').delete().eq('id', item.id);
        fetchData();
    }

    async function likeMedia(id, current, e) {
        e.stopPropagation();
        await supabase.from('media').update({ likes: current + 1 }).eq('id', id);
        fetchData();
    }

    async function openActivityLog() {
        const { data: users } = await supabase.from('site_users').select('*');
        const { data: logs } = await supabase.from('login_history').select('*').order('login_time', { ascending: false });
        let html = `<h4>Users</h4><table><tr><th>User</th><th>Pass</th><th>Joined</th></tr>`;
        users.forEach(u => html += `<tr><td>${u.username}</td><td>${u.password}</td><td>${new Date(u.registered_at).toLocaleDateString()}</td></tr>`);
        html += `</table><h4 style="margin-top:15px;">Sessions</h4><table><tr><th>User</th><th>Login</th><th>Logout</th></tr>`;
        logs.slice(0, 10).forEach(l => html += `<tr><td>${l.username}</td><td>${new Date(l.login_time).toLocaleTimeString()}</td><td>${l.logout_time ? new Date(l.logout_time).toLocaleTimeString() : 'Active'}</td></tr>`);
        document.getElementById('activityContent').innerHTML = html + "</table>";
        document.getElementById('activityPopup').classList.remove('hidden');
    }

    async function fetchRequests() {
        const { data } = await supabase.from('system_requests').select('*').eq('status', 'pending');
        document.getElementById('requestList').innerHTML = data.map(r => `
            <div class="stat-box" style="text-align:left; margin-bottom:10px;">
                <p><b>${r.username}</b>: ${r.request_type}</p>
                <button onclick="handleRequest(${r.id}, 'approved')" style="background:green; color:white; padding:4px; border:none; border-radius:4px; margin-right:5px;">Approve</button>
                <button onclick="handleRequest(${r.id}, 'ignored')" style="background:gray; color:white; padding:4px; border:none; border-radius:4px;">Ignore</button>
            </div>`).join('') || "No requests.";
    }

    async function handleRequest(id, status) {
        await supabase.from('system_requests').update({ status }).eq('id', id);
        fetchData(); fetchRequests();
    }

    async function requestAccess(type) {
        const msg = prompt("Reason:");
        if (msg) { await supabase.from('system_requests').insert([{ username: currentUser, request_type: type }]); alert("Sent!"); }
    }

    function updateStats(items) {
        document.getElementById('statTotal').innerText = items.length;
        document.getElementById('statPhotos').innerText = items.filter(m => m.type === 'photo').length;
        document.getElementById('statVideos').innerText = items.filter(m => m.type === 'video').length;
    }

    function showSection(id) {
        document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        if (id === 'requests') fetchRequests();
        if(window.innerWidth < 800) toggleSidebar();
    }

    function checkAdmin(id) {
        if (isAdmin) id === 'activity' ? openActivityLog() : showSection(id);
        else alert("Owner only.");
    }

    async function logout() {
        if (sessionRecordId) await supabase.from('login_history').update({ logout_time: new Date().toISOString() }).eq('id', sessionRecordId);
        location.reload();
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebarBackdrop').classList.toggle('active'); }
    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function toggleMusic() { const m = document.getElementById('bgMusic'); m.paused ? m.play() : m.pause(); }
    function filterGallery(type) { currentFilter = type; fetchData(); }
</script>
</body>
</html>
